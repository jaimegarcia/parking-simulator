<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Parking Simulator - Smart Adaptive AI</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <h1><span>2D Parking Simulator</span> <span class="hint">Click spots to toggle obstacles</span></h1>
  <canvas id="pc"></canvas>
  <div id="controls">
    <div class="cg">
      <div class="cl">Target Spot</div>
      <select id="sel-spot">
        <option value="0">Spot 0 (Top)</option>
        <option value="1">Spot 1 (Top)</option>
        <option value="2">Spot 2 (Top)</option>
        <option value="3">Spot 3 (Top)</option>
        <option value="4">Spot 4 (Bottom)</option>
        <option value="5" selected>Spot 5 (Bottom)</option>
        <option value="6">Spot 6 (Bottom)</option>
        <option value="7">Spot 7 (Bottom)</option>
      </select>
      <div class="cl cl-spaced">Maneuver</div>
      <select id="sel-man">
        <option value="reverse">Reverse Perpendicular</option>
        <option value="forward">Forward Pull-In</option>
      </select>
      <div class="value-row">
        <label class="cl cl-spaced" for="angle-range">Lot Angle</label>
        <div class="control-value" id="angle-value">0°</div>
      </div>
      <input id="angle-range" type="range" min="0" max="45" step="1" value="0">
      <div class="speed-row">
        <label class="cl cl-spaced" for="speed-range">Speed</label>
        <div class="control-value" id="speed-value">1.0x</div>
      </div>
      <input id="speed-range" type="range" min="25" max="200" step="5" value="100">
    </div>
    <div class="cg">
      <div class="cl">Obstacles</div>
      <button id="btn-obs">Randomize Cars</button>
      <div class="cl cl-spaced">Actions</div>
      <button id="btn-start">Start Auto-Park</button>
      <button id="btn-pause" disabled>Pause Parking</button>
      <button id="btn-reset">Reset Position</button>
    </div>
    <div id="stats">
      <div class="st"><div class="sv" id="s-dir">FWD</div><div class="sl">Direction</div></div>
      <div class="st"><div class="sv" id="s-steer">0°</div><div class="sl">Steer</div></div>
      <div class="st"><div class="sv" id="s-head">90°</div><div class="sl">Heading</div></div>
      <div class="st"><div class="sv" id="s-seg">—</div><div class="sl">Segment</div></div>
      <div class="st"><div class="sv" id="s-prog">0%</div><div class="sl">Progress</div></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
